# OpenEnv Environment Configuration (spec_version: 1)
# This is the CORRECT format that the Meta Hackathon validator expects
spec_version: 1
name: crm-query-env
type: standard
description: OpenEnv-compliant CRM Query Environment for multi-step reasoning tasks

runtime:
  image: python:3.11
  python_version: "3.11"

app: hf_space_app.py
port: 7860

tasks:
  - id: task_easy_001
    description: "Find the customer with ID C005 and return their customer_id."
    grader:
      type: http
      endpoint: /grader
      task_id: task_easy_001

  - id: task_medium_001
    description: "Find all customers who are either Gold tier OR have purchased a Laptop. Return their customer_ids."
    grader:
      type: http
      endpoint: /grader
      task_id: task_medium_001

  - id: task_hard_001
    description: "Find all Gold-tier customers who have at least one HIGH priority OPEN support ticket. Return their customer_ids."
    grader:
      type: http
      endpoint: /grader
      task_id: task_hard_001

  - id: task_extreme_001
    description: "Find all customers who appeared in previous Gold-tier queries AND have at least one HIGH priority OPEN support ticket. This requires memory reuse."
    grader:
      type: http
      endpoint: /grader
      task_id: task_extreme_001
    properties:
      current_task_id: string
      step_count: integer
      max_steps: integer
      history: array
      done: boolean
      final_answer: object

  
